services:
  # ─── Backend Service ────────────────────────────────────────────────────────
  - type: web
    name: ttrims-backend-4xho
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.sergoskjjzfrdrzfieye
      - key: SPRING_DATASOURCE_PASSWORD
        value: W0N4i4sBP613kz37
      # Automatically generate a secure 32+ character JWT secret on initial deploy
      - key: JWT_SECRET
        generateValue: true

  # ─── Frontend Service ───────────────────────────────────────────────────────
  - type: web
    name: ttrims-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      # Map the API proxy to the live backend service URL
      - key: BACKEND_URL
        value: http://ttrims-backend:5000/api
