services:
  # ─── Backend Service ────────────────────────────────────────────────────────
  - type: web
    name: ttrims-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      # Connect directly to your existing PostgreSQL database using the external hostname
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d8in6lcvikkc73c1l780-a.virginia-postgres.render.com:5432/ims_db_z4x7?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: ims_db_z4x7_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: OXuCjVeOESq1tooj37MjWfRXUvuPgg5k
      # Automatically generate a secure 32+ character JWT secret on initial deploy
      - key: JWT_SECRET
        generateValue: true

  # ─── Frontend Service ───────────────────────────────────────────────────────
  - type: web
    name: ttrims-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      # Map the API proxy to the live backend service URL
      - key: BACKEND_URL
        value: https://ttrims-backend-4xho.onrender.com/api
