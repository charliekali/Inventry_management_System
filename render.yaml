services:
  # ─── Backend Service ────────────────────────────────────────────────────────
  - type: web
    name: ttrims-backend-4xho
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db.sergoskjjzfrdrzfieye.supabase.co:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Automatically generate a secure 32+ character JWT secret on initial deploy
      - key: JWT_SECRET
        generateValue: true

  # ─── Frontend Service ───────────────────────────────────────────────────────
  - type: web
    name: ttrims-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      # Map the API proxy to the live backend service URL
      - key: BACKEND_URL
        value: http://ttrims-backend:5000/api
