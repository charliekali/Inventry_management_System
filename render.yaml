services:
  # ─── Backend Service ────────────────────────────────────────────────────────
  - type: web
    name: ttrims-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      # Database connection details automatically injected from the database service
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: ttrims-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: ttrims-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: ttrims-postgres
          property: password
      # Automatically generate a secure 32+ character JWT secret on initial deploy
      - key: JWT_SECRET
        generateValue: true

  # ─── Frontend Service ───────────────────────────────────────────────────────
  - type: web
    name: ttrims-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      # Map the API proxy to the backend container's internal service URL
      - key: BACKEND_URL
        value: http://ttrims-backend:5000/api

# ─── Database Service ─────────────────────────────────────────────────────────
databases:
  - name: ttrims-postgres
    databaseName: ims_db
    user: postgres
    plan: free
